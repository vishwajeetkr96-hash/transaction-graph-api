# 1. Basic Metadata
spring.application.name=transaction-explorer
server.port=8080

# 2. Jackson (JSON) Configuration
# This ensures ISO-8601 dates (e.g. 2025-01-03T10:15:00Z) are handled correctly
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.default-property-inclusion=non_null

# 3. Logging (Crucial for Debugging Graph Traversal)
# This helps you see which nodes are being loaded at startup
logging.level.com.vishwajeet.transaction_explorer=DEBUG

# 4. Error Handling
# Ensures that internal error messages aren't accidentally hidden
server.error.include-message=always

# 1. Force Spring to throw an exception when a URL doesn't match a controller
spring.mvc.throw-exception-if-no-handler-found=true

# 2. Disable default resource mapping so it doesn't try to find a static file first
spring.web.resources.add-mappings=false